name: Deploy to GitHub Pages

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 패키지 설치
        run: pnpm install

      - name: 빌드
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
          VITE_BASE_PATH: /cue-bit/

      - name: GitHub Pages 환경 설정
        uses: actions/configure-pages@v5

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
