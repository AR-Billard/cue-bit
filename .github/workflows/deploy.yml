name: Deploy to GitHub Pages

on:
  # v로 시작하는 태그가 push될 때만 실행 (예: v1.0.0, v1.2.3)
  push:
    tags:
      - "v*"

  # GitHub Actions 탭에서 수동으로도 실행 가능
  workflow_dispatch:

# GitHub Pages에 배포할 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않도록 설정
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ① 빌드 Job
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 패키지 설치
        run: pnpm install

      # 태그 이름을 빌드 결과물에 환경변수로 주입 (선택사항 — 앱 내에서 버전 표시할 때 활용 가능)
      - name: 빌드
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: GitHub Pages 환경 설정
        uses: actions/configure-pages@v5

      - name: 빌드 결과물 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ② 배포 Job
  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4